<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voorbeeld</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px; }
    .demo { max-width:520px; text-align:center; }
    .demo h1 { font-family:var(--serif); font-size:30px; font-weight:500; margin:0 0 14px; }
    .demo p { color:var(--tekst); line-height:1.6; margin:0; }
  </style>
</head>
<body>
  <div class="demo">
    <h1>Hier verschijnt jouw oefenmateriaal</h1>
    <p>Dit is een voorbeeldbestand. Vervang het door je eigen spel of opdracht en verwijs er in de lijst naar met een titel en het pad naar het bestand. De rest gaat vanzelf.</p>
  </div>
</body>
</html>
